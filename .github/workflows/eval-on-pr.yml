name: GKE-MCP Agent Baseline Evaluation

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions: read-all

on:
  pull_request_target:
    types: [opened, synchronize, reopened, labeled]
    branches: [main, "feature/**"]
    paths:
      - "pkg/agents/**"
      - ".github/workflows/eval-on-pr.yml"

jobs:
  evaluate:
    runs-on: ubuntu-latest
    if: contains(github.event.pull_request.labels.*.name, 'run-evals')

    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          credentials_json: "${{ secrets.GCP_SA_KEY }}"

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: "go.mod"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Build UI
        run: |
          npm --prefix ui install
          npm --prefix ui run build

      - name: Build Go Server
        run: go build -o gke-mcp .

      - name: Install Python Dependencies
        run: |
          python -m venv venv
          ./venv/bin/pip install --index-url https://pypi.org/simple -r pkg/agents/evals/requirements.txt

      - name: Run Evaluation
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          ./venv/bin/pytest pkg/agents/evals/test_compare_baseline.py

      - name: Add Job Summary
        if: always()
        run: |
          if [ -f pkg/agents/evals/JOB_SUMMARY.md ]; then
            cat pkg/agents/evals/JOB_SUMMARY.md >> $GITHUB_STEP_SUMMARY
          fi
